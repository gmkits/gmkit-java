name: Publish Maven Central

on:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: publish-maven-central-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        shell: bash
        run: |
          missing=()
          [[ -z "$CENTRAL_TOKEN_USERNAME" ]] && missing+=("CENTRAL_TOKEN_USERNAME")
          [[ -z "$CENTRAL_TOKEN_PASSWORD" ]] && missing+=("CENTRAL_TOKEN_PASSWORD")
          [[ -z "$MAVEN_GPG_PRIVATE_KEY" ]] && missing+=("MAVEN_GPG_PRIVATE_KEY")
          [[ -z "$GPG_PASSPHRASE" ]] && missing+=("MAVEN_GPG_PASSPHRASE")

          if (( ${#missing[@]} > 0 )); then
            echo "缺少 GitHub Secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: |
            pom.xml
            gmkit/pom.xml
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Resolve project version
        id: version
        shell: bash
        run: echo "version=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)" >> "$GITHUB_OUTPUT"

      - name: Ensure release version
        shell: bash
        run: |
          if [[ "${{ steps.version.outputs.version }}" == *-SNAPSHOT ]]; then
            echo "Maven Central 只接受非 SNAPSHOT 版本，当前版本为 ${{ steps.version.outputs.version }}。" >&2
            exit 1
          fi

      - name: Deploy to Maven Central
        run: mvn -B -ntp -Prelease -DskipTests deploy
