name: Release Verify

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: |
            pom.xml
            gmkit/pom.xml

      - name: Verify release build
        run: mvn -B -ntp -Prelease -Dgpg.skip=true -DskipTests verify
